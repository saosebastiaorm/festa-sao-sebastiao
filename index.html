<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
linear-gradient(rgba(255,255,255,0.78),rgba(255,255,255,0.78)),
url('https://raw.githubusercontent.com/saosebastiaorm/festa-sao-sebastiao/main/Imagens/Site/FPSS/Artes/VI%20FPSS/CARTAZ_Reduzido.png');
color:#111;
line-height:1.5;
background-size:cover;
background-position:center;
background-attachment:fixed;
background-repeat:no-repeat;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(4px);
-webkit-backdrop-filter:blur(4px);
pointer-events:none;
z-index:-1;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at top right, rgba(255,255,255,0.22), transparent 35%),
radial-gradient(circle at bottom left, rgba(127,29,29,0.14), transparent 40%);
pointer-events:none;
z-index:-1;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.hero{
text-align:center;
color:#fff;
padding:55px 20px;
background:linear-gradient(rgba(127,29,29,.82),rgba(127,29,29,.70));
border-radius:0 0 28px 28px;
box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.hero h1{
font-size:38px;
margin-bottom:12px;
text-shadow:0 2px 8px rgba(0,0,0,.35);
}

.hero p{
font-size:18px;
margin:6px 0;
}

.card{
background:rgba(255,255,255,0.92);
border-radius:18px;
padding:24px;
margin:16px 0;
box-shadow:0 12px 28px rgba(0,0,0,.10);
backdrop-filter:blur(2px);
-webkit-backdrop-filter:blur(2px);
}

.grid-2{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

.logo-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

.logo-box{
background:#fff;
border-radius:18px;
padding:16px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,.08);
transition:.25s;
}

.logo-box:hover{
transform:translateY(-4px);
box-shadow:0 16px 26px rgba(0,0,0,.12);
}

.logo-box img{
width:100%;
height:120px;
object-fit:contain;
}

.logo-box p{
margin-top:10px;
font-weight:bold;
font-size:15px;
}

.btn{
display:inline-block;
padding:14px 18px;
border-radius:12px;
color:#fff;
text-decoration:none;
font-weight:bold;
margin-top:8px;
margin-bottom:10px;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
opacity:.94;
}

.green{background:#16a34a;}
.blue{background:#2563eb;}
.purple{background:#7c3aed;}

.section-title{
margin-bottom:12px;
font-size:26px;
}

.highlight-red{
font-size:28px;
font-weight:bold;
color:#dc2626;
}

.highlight-green{
font-size:20px;
font-weight:bold;
color:#16a34a;
}

.small-space{
margin-top:14px;
}

footer{
text-align:center;
padding:30px;
color:#333;
font-size:14px;
font-weight:bold;
}

@media(min-width:800px){
.grid-2{
grid-template-columns:1fr 1fr;
}

.hero h1{
font-size:46px;
}
}
</style>
