<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Festa do Padroeiro São Sebastião</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
}

/* HERO PRINCIPAL */
.hero{
  background:linear-gradient(135deg,#8b1111,#ff1f1f);
  padding:90px 20px;
  text-align:center;
}

.hero h1{
  font-size:42px;
  margin-bottom:15px;
}

.hero p{
  font-size:18px;
  opacity:.9;
  margin-bottom:20px;
}

/* ALERTA */
.badge{
  display:inline-block;
  background:#ffd000;
  color:#000;
  padding:10px 16px;
  border-radius:999px;
  font-weight:bold;
  margin-bottom:20px;
}

/* BOTÃO */
.btn{
  display:inline-block;
  background:#00c853;
  color:#fff;
  padding:18px 30px;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* SEÇÃO INFO */
.info{
  max-width:900px;
  margin:50px auto;
  padding:20px;
  text-align:center;
}

.card{
  background:#1c1c1c;
  padding:20px;
  margin:15px;
  border-radius:15px;
}
</style>

</head>

<body>

<section class="hero">

  <h1>🔥 FESTA DO PADROEIRO SÃO SEBASTIÃO</h1>

  <div class="badge">🎯 ENQUETE OFICIAL + CAMISETA PREMIADA</div>

  <p>
    Participe da nossa enquete e ajude a melhorar a festa.<br>
    Você ainda concorre a uma camiseta exclusiva.
  </p>

  <a class="btn" href="enquete.html">
    QUERO PARTICIPAR AGORA 🚀
  </a>

</section>

<section class="info">

  <div class="card">
    🎉 Tradição da comunidade
  </div>

  <div class="card">
    🍖 Churrasco, missa e bingo
  </div>

  <div class="card">
    🎁 Sorteios e prêmios especiais
  </div>

</section>

</body>
</html>
