<!DOCTYPE html>
<!-- Define que o documento segue padrão HTML5 -->

<html lang="pt-br">
<!-- Define idioma principal do site para português do Brasil -->

<head>

<meta charset="UTF-8">
<!-- Suporte a acentos e caracteres especiais -->

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<!-- Responsividade: adapta o site para celular, tablet e desktop -->

<meta name="description" content="6ª Festa do Padroeiro São Sebastião - Rolim de Moura/RO">
<!-- SEO: descrição do site para Google -->

<title>6ª FPSS • Festa do Padroeiro São Sebastião</title>
<!-- Título da aba do navegador -->

<style>

/* =========================================================
   RESET GLOBAL
   Remove estilos padrões do navegador
========================================================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Rolagem suave ao clicar em âncoras */
html{
    scroll-behavior:smooth;
}

/* =========================================================
   FUNDO DO SITE (LAYOUT BASE VISUAL)
========================================================= */
body{

    font-family:Arial,sans-serif;
    /* fonte padrão do site */

    color:#111;
    /* cor base do texto */

    line-height:1.5;
    /* espaçamento entre linhas */

    background:
    linear-gradient(
        rgba(255,248,235,.78),
        rgba(255,248,235,.78)
    ),
    url('https://raw.githubusercontent.com/saosebastiaorm/festa-sao-sebastiao/main/Imagens/Site/FPSS/Eventos/V%20FPSS/Imagem_aerea_lateral.jpg');

    /* imagem + camada de transparência clara */

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    background-repeat:no-repeat;
}

/* =========================================================
   EFEITO DE LUZ AMBIENTE (OVERLAY VISUAL)
========================================================= */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top right, rgba(255,215,0,.10), transparent 28%),
    radial-gradient(circle at bottom left, rgba(255,255,255,.18), transparent 35%);

    pointer-events:none;
    /* não interfere em cliques */

    z-index:-1;
}

/* =========================================================
   CONTAINER PRINCIPAL
========================================================= */
.wrap{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* =========================================================
   HERO (TOPO PRINCIPAL DO SITE)
========================================================= */
.hero{

    padding:65px 20px;
    border-radius:0 0 34px 34px;

    color:#fff;
    position:relative;
    overflow:hidden;

    background:
    radial-gradient(circle at top right, rgba(255,215,0,.18), transparent 25%),
    linear-gradient(135deg,#5b0f0f,#7f1d1d,#991b1b);

    box-shadow:0 18px 40px rgba(0,0,0,.20);
}

/* GRID do hero (texto + logo) */
.hero-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:35px;
    align-items:center;
}

/* texto do topo */
.hero-text{
    text-align:center;
}

/* título principal */
.hero h1{
    font-size:42px;
    line-height:1.1;
    margin-bottom:12px;
    text-shadow:0 4px 14px rgba(0,0,0,.45);
}

/* subtítulos */
.hero p{
    font-size:18px;
    margin:6px 0;
    font-weight:bold;
}

/* lado da logo */
.hero-side{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* brilho atrás da logo */
.hero-side::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;

    background:radial-gradient(circle, rgba(255,215,0,.75), rgba(255,215,0,.15), transparent 70%);

    filter:blur(10px);
    animation:pulseGlow 3s infinite ease-in-out;
}

/* logo principal */
.hero-side img{
    width:100%;
    max-width:280px;
    z-index:2;
    position:relative;

    animation:rotateSoft 14s infinite linear;
    filter:drop-shadow(0 18px 28px rgba(0,0,0,.30));
}

/* =========================================================
   CONTADOR REGRESSIVO
========================================================= */
.countdown{
    margin-top:24px;
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}

.time-box{
    background:rgba(255,255,255,.15);
    padding:12px 14px;
    border-radius:14px;
    min-width:86px;
    backdrop-filter:blur(3px);
}

.time-number{
    font-size:28px;
    font-weight:bold;
}

.time-label{
    font-size:12px;
    letter-spacing:1px;
}

/* =========================================================
   BOTÕES (UI INTERAÇÃO)
========================================================= */
.hero-btn,.btn{
    display:inline-block;
    padding:14px 20px;
    border-radius:12px;

    color:#fff;
    text-decoration:none;

    font-weight:bold;
    transition:.25s;
    margin-top:12px;
}

/* botão principal */
.hero-btn{
    background:#16a34a;
    box-shadow:0 10px 20px rgba(0,0,0,.20);
}

/* botão padrão */
.btn{
    display:block;
    text-align:center;
    margin-bottom:12px;
}

/* efeito hover */
.hero-btn:hover,.btn:hover{
    transform:translateY(-3px);
    opacity:.95;
}

/* cores auxiliares */
.green{background:#16a34a;}
.blue{background:#2563eb;}
.purple{background:#7c3aed;}

/* =========================================================
   LAYOUT DE SEÇÕES
========================================================= */
.grid-2,.grid-3{
    display:grid;
    grid-template-columns:1fr;
    gap:18px;
    margin-top:18px;
}

/* card padrão */
.card{
    background:rgba(255,255,255,.94);
    border-radius:22px;
    padding:24px;
    box-shadow:0 14px 30px rgba(0,0,0,.10);
}

/* título de seção */
.section-title{
    font-size:28px;
    margin-bottom:14px;
    color:#7f1d1d;
}

/* destaque vermelho */
.highlight-red{
    font-size:32px;
    font-weight:bold;
    color:#dc2626;
}

/* destaque verde */
.highlight-green{
    font-size:20px;
    font-weight:bold;
    color:#16a34a;
}

/* espaçamento */
.small-space{
    margin-top:14px;
}

/* =========================================================
   BINGO
========================================================= */
.bingo-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
    align-items:center;
}

.bingo-grid img{
    width:100%;
    max-width:340px;
    border-radius:18px;
    margin:auto;
    display:block;
}

/* =========================================================
   PARCEIROS
========================================================= */
.logo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:18px;
}

.logo-box{
    background:#fff;
    border-radius:18px;
    padding:14px;
    text-align:center;
    animation:floatLogo 4s infinite ease-in-out;
}

/* animações alternadas */
.logo-box:nth-child(2){animation-delay:.4s;}
.logo-box:nth-child(3){animation-delay:.8s;}
.logo-box:nth-child(4){animation-delay:1.2s;}

/* imagem parceiro */
.logo-box img{
    width:100%;
    height:110px;
    object-fit:contain;
}

/* =========================================================
   ANIMAÇÕES
========================================================= */
@keyframes rotateSoft{
    0%{transform:rotate(0deg);}
    50%{transform:rotate(6deg);}
    100%{transform:rotate(0deg);}
}

@keyframes pulseGlow{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.12);}
}

@keyframes floatLogo{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- ================= TOPO ================= -->
<header class="hero">
<div class="wrap">

<div class="hero-grid">

<div class="hero-text">

<h1>6ª FPSS<br>Festa do Padroeiro São Sebastião</h1>

<p>24 de Janeiro de 2027 • Rolim de Moura/RO</p>
<p>Fé, tradição e grande confraternização</p>

<!-- CONTADOR -->
<div class="countdown" id="countdown">

<div class="time-box"><div class="time-number" id="dias">0</div><div class="time-label">DIAS</div></div>
<div class="time-box"><div class="time-number" id="horas">0</div><div class="time-label">HORAS</div></div>
<div class="time-box"><div class="time-number" id="minutos">0</div><div class="time-label">MIN</div></div>
<div class="time-box"><div class="time-number" id="segundos">0</div><div class="time-label">SEG</div></div>

</div>

<a class="hero-btn"
href="https://wa.me/5569993982037"
target="_blank">
Comprar Cartela
</a>

</div>

<div class="hero-side">
<img alt="Logo FPSS"
src="https://raw.githubusercontent.com/saosebastiaorm/festa-sao-sebastiao/main/Imagens/Site/Logo/FPSS/Logo_FPSS_-_IA-removebg.png">
</div>

</div>
</div>
</header>

<!-- ================= JS ================= -->
<script>

/* data do evento (formato seguro) */
const dataEvento = new Date("2027-01-24T10:00:00").getTime();

/* função principal do contador */
function atualizarContador(){

const agora = new Date().getTime();
const distancia = dataEvento - agora;

if(distancia <= 0){
document.getElementById("countdown").innerHTML =
"<div class='time-box'><div class='time-number'>HOJE</div><div class='time-label'>A FESTA COMEÇOU</div></div>";
return;
}

document.getElementById("dias").textContent =
Math.floor(distancia/(1000*60*60*24));

document.getElementById("horas").textContent =
Math.floor((distancia%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutos").textContent =
Math.floor((distancia%(1000*60*60))/(1000*60));

document.getElementById("segundos").textContent =
Math.floor((distancia%(1000*60))/1000);

}

/* loop do contador */
setInterval(atualizarContador,1000);
atualizarContador();

</script>

</body>
</html>
