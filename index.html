<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="6ª Festa do Padroeiro São Sebastião - Rolim de Moura/RO. Programação, bingo, compra de cartelas e parceiros.">
  <title>6ª FPSS • Festa do Padroeiro São Sebastião</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      color: #111;
      line-height: 1.5;
      background: linear-gradient(rgba(255,248,235,.72), rgba(255,248,235,.72)), 
        url('https://raw.githubusercontent.com/saosebastiaorm/festa-sao-sebastiao/main/Imagens/Site/FPSS/Eventos/V%20FPSS/Imagem_aerea_lateral.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255,215,0,.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,255,255,.22), transparent 35%);
      pointer-events: none;
      z-index: -1;
    }

    .wrap {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    /* TOPO PREMIUM */
    .hero {
      padding: 60px 20px;
      border-radius: 0 0 34px 34px;
      color: #fff;
      position: relative;
      overflow: hidden;
      background: 
        linear-gradient(135deg, #5b0f0f 0%, #7f1d1d 35%, #991b1b 65%, #7c2d12 100%),
        radial-gradient(circle at top right, rgba(255,215,0,.22), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,255,255,.10), transparent 35%);
      box-shadow: 0 18px 40px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 0;
      left: -20%;
      width: 140%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
      transform: skewX(-18deg);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .hero-text {
      text-align: center;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 12px;
      text-shadow: 0 4px 16px rgba(0,0,0,.55);
    }

    .hero p {
      font-size: 18px;
      margin: 6px 0;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,.45);
    }

    .hero-btn, .btn {
      display: block;
      text-align: center;
      padding: 14px 18px;
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
      transition: .25s;
    }

    .hero-btn {
      display: inline-block;
      padding: 14
      
      .hero-btn {
        display: inline-block;
        padding: 14px 24px;
        background: #16a34a;
        box-shadow: 0 10px 20px rgba(0,0,0,.18);
      }

      .hero-btn:hover, .btn:hover {
        transform: translateY(-3px);
        opacity: .95;
      }

      .green { background: #16a34a; }
      .blue { background: #2563eb; }
      .purple { background: #7c3aed; }

      /* Layout */
      .grid-2, .grid-3 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
        margin-top: 18px;
      }

      .card {
        background: rgba(255,255,255,.94);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 14px 30px rgba(0,0,0,.10);
        backdrop-filter: blur(2px);
      }

      .section-title {
        font-size: 26px;
        margin-bottom: 12px;
        color: #7f1d1d;
      }

      .highlight-red {
        font-size: 30px;
        font-weight: bold;
        color: #dc2626;
      }

      .highlight-green {
        font-size: 20px;
        font-weight: bold;
        color: #16a34a;
        margin-top: 6px;
      }

      .small-space {
        margin-top: 14px;
      }

      /* Bingo */
      .bingo-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        align-items: center;
      }

      .bingo-grid img {
        width: 100%;
        max-width: 340px;
        margin: auto;
        display: block;
        border-radius: 18px;
        box-shadow: 0 12px 24px rgba(0,0,0,.14);
      }

      /* Patrocinadores */
      .logo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .logo-box {
        background: #fff;
        border-radius: 18px;
        padding: 14px;
        text-align: center;
        box-shadow: 0 8px 18px rgba(0,0,0,.08);
        animation: floatLogo 4s infinite ease-in-out;
      }

      .logo-box:nth-child(2) { animation-delay: .4s; }
      .logo-box:nth-child(3) { animation-delay: .8s; }
      .logo-box:nth-child(4) { animation-delay: 1.2s; }

      .logo-box img {
        width: 100%;
        height: 110px;
        object-fit: contain;
      }

      .logo-box p {
        margin-top: 8px;
        font-weight: bold;
        font-size: 15px;
      }

      footer {
        text-align: center;
        padding: 30px;
        font-size: 14px;
        font-weight: bold;
        color: #333;
      }

      /* Animações */
      @keyframes rotateSoft {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(6deg); }
        100% { transform: rotate(0deg); }
      }

      @keyframes pulseGlow {
        0%, 100% { transform: scale(1); opacity: .9; }
        50% { transform: scale(1.12); opacity: 1; }
      }

      @keyframes floatLogo
      
      @keyframes floatLogo {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      /* Responsividade */
      @media (min-width: 900px) {
        .hero-grid {
          grid-template-columns: 1.1fr .9fr;
        }

        .hero-text {
          text-align: left;
        }

        .countdown {
          justify-content: flex-start;
        }

        .grid-2 {
          grid-template-columns: 1fr 1fr;
        }

        .grid-3 {
          grid-template-columns: 1fr 1fr;
        }

        .bingo-grid {
          grid-template-columns: 1.1fr .9fr;
        }

        .hero h1 {
          font-size: 52px;
        }
      }
    </style>
</head>
<body>

  <header class="hero">
    <div class="wrap">
      <div class="hero-grid">
        <div class="hero-text">
          <h1>6ª FPSS<br>Festa do Padroeiro São Sebastião</h1>
          <p>24 de Janeiro de 2027 • Rolim de Moura/RO</p>
          <p>Fé, tradição e grande confraternização</p>
          <div class="countdown" id="countdown">
            <div class="time-box"><div class="time-number" id
