<!DOCTYPE html>
<!-- =========================================================
DEFINE QUE O DOCUMENTO USA HTML5 (PADRÃO MODERNO WEB)
========================================================= -->
<html lang="pt-br">

<head>

<!-- =========================================================
CONFIGURAÇÃO DE CARACTERES (SUPORTE A ACENTOS)
========================================================= -->
<meta charset="UTF-8">

<!-- =========================================================
RESPONSIVIDADE (ADAPTA EM CELULAR, TABLET E DESKTOP)
========================================================= -->
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<!-- =========================================================
SEO - DESCRIÇÃO DO SITE (GOOGLE / REDES SOCIAIS)
========================================================= -->
<meta name="description" content="6ª Festa do Padroeiro São Sebastião - Rolim de Moura/RO">

<!-- =========================================================
TÍTULO DA ABA DO NAVEGADOR
========================================================= -->
<title>6ª FPSS • Festa do Padroeiro São Sebastião</title>

<style>

/* =========================================================
RESET GLOBAL (REMOVE PADRÕES DO NAVEGADOR)
========================================================= */
*{
    margin:0; /* remove espaçamento externo padrão */
    padding:0; /* remove espaçamento interno padrão */
    box-sizing:border-box; /* inclui padding dentro da largura */
}

/* =========================================================
ROLAGEM SUAVE PARA LINKS INTERNOS
========================================================= */
html{
    scroll-behavior:smooth;
}

/* =========================================================
FUNDO GLOBAL DO SITE (IMAGEM + CAMADA CLARA)
========================================================= */
body{

    font-family:Arial,sans-serif; /* fonte padrão */
    color:#111; /* cor principal do texto */
    line-height:1.5; /* espaçamento entre linhas */

    /* fundo com imagem + camada de clareamento */
    background:
    linear-gradient(rgba(255,248,235,.78),rgba(255,248,235,.78)),
    url('https://raw.githubusercontent.com/saosebastiaorm/festa-sao-sebastiao/main/Imagens/Site/FPSS/Eventos/V%20FPSS/Imagem_aerea_lateral.jpg');

    background-size:cover; /* cobre tela inteira */
    background-position:center; /* centraliza imagem */
    background-attachment:fixed; /* efeito parallax */
    background-repeat:no-repeat; /* evita repetição */
}

/* =========================================================
EFEITO DE ILUMINAÇÃO AMBIENTE (OVERLAY VISUAL)
========================================================= */
body::before{

    content:""; /* obrigatório em pseudo-elemento */
    position:fixed; /* fixa na tela */
    inset:0; /* ocupa toda tela */

    /* dois brilhos decorativos */
    background:
    radial-gradient(circle at top right, rgba(255,215,0,.10), transparent 28%),
    radial-gradient(circle at bottom left, rgba(255,255,255,.18), transparent 35%);

    pointer-events:none; /* não bloqueia clique */
    z-index:-1; /* fica atrás de tudo */
}

/* =========================================================
CONTAINER PRINCIPAL (CENTRALIZA CONTEÚDO)
========================================================= */
.wrap{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* =========================================================
CABEÇALHO HERO (ÁREA PRINCIPAL DO SITE)
========================================================= */
.hero{

    padding:65px 20px;
    border-radius:0 0 34px 34px;

    color:#fff;
    position:relative;
    overflow:hidden;

    /* fundo degradê institucional */
    background:
    radial-gradient(circle at top right, rgba(255,215,0,.18), transparent 25%),
    linear-gradient(135deg,#5b0f0f,#7f1d1d,#991b1b);

    box-shadow:0 18px 40px rgba(0,0,0,.20);
}

/* layout interno do hero */
.hero-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:35px;
    align-items:center;
}

/* texto do hero */
.hero-text{
    text-align:center;
}

/* título principal */
.hero h1{
    font-size:42px;
    line-height:1.1;
    margin-bottom:12px;
    text-shadow:0 4px 14px rgba(0,0,0,.45);
}

/* subtítulos */
.hero p{
    font-size:18px;
    margin:6px 0;
    font-weight:bold;
}

/* lado da logo */
.hero-side{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* brilho atrás da logo */
.hero-side::before{

    content:"";
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;

    background:radial-gradient(circle, rgba(255,215,0,.75), rgba(255,215,0,.15), transparent 70%);

    filter:blur(10px);
    animation:pulseGlow 3s infinite ease-in-out;
}

/* logo principal */
.hero-side img{

    width:100%;
    max-width:280px;
    position:relative;
    z-index:2;

    animation:rotateSoft 14s infinite linear;
    filter:drop-shadow(0 18px 28px rgba(0,0,0,.30));
}

/* =========================================================
CONTADOR REGRESSIVO (TEMPO ATÉ EVENTO)
========================================================= */
.countdown{

    margin-top:24px;
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}

/* caixa individual do tempo */
.time-box{
    background:rgba(255,255,255,.15);
    padding:12px 14px;
    border-radius:14px;
    min-width:86px;
    backdrop-filter:blur(3px);
}

/* número do contador */
.time-number{
    font-size:28px;
    font-weight:bold;
}

/* label do contador */
.time-label{
    font-size:12px;
    letter-spacing:1px;
}

/* =========================================================
BOTÕES
========================================================= */
.hero-btn,.btn{

    display:inline-block;
    padding:14px 20px;
    border-radius:12px;

    color:#fff;
    text-decoration:none;
    font-weight:bold;

    transition:.25s;
    margin-top:12px;
}

/* botão principal */
.hero-btn{
    background:#16a34a;
    box-shadow:0 10px 20px rgba(0,0,0,.20);
}

/* botão padrão */
.btn{
    display:block;
    text-align:center;
    margin-bottom:12px;
}

/* efeito hover */
.hero-btn:hover,.btn:hover{
    transform:translateY(-3px);
    opacity:.95;
}

/* cores auxiliares */
.green{background:#16a34a;}
.blue{background:#2563eb;}
.purple{background:#7c3aed;}

/* =========================================================
LAYOUT DE CARDS
========================================================= */
.grid-2,.grid-3{
    display:grid;
    grid-template-columns:1fr;
    gap:18px;
    margin-top:18px;
}

/* cartão branco */
.card{
    background:rgba(255,255,255,.94);
    border-radius:22px;
    padding:24px;
    box-shadow:0 14px 30px rgba(0,0,0,.10);
}

/* título das seções */
.section-title{
    font-size:28px;
    margin-bottom:14px;
    color:#7f1d1d;
}

/* destaque vermelho */
.highlight-red{
    font-size:32px;
    font-weight:bold;
    color:#dc2626;
}

/* destaque verde */
.highlight-green{
    font-size:20px;
    font-weight:bold;
    color:#16a34a;
}

/* espaçamento extra */
.small-space{
    margin-top:14px;
}

/* =========================================================
BINGO
========================================================= */
.bingo-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
    align-items:center;
}

.bingo-grid img{
    width:100%;
    max-width:340px;
    margin:auto;
    display:block;
    border-radius:18px;
}

/* =========================================================
PATROCINADORES
========================================================= */
.logo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:18px;
}

/* card patrocinador */
.logo-box{
    background:#fff;
    border-radius:18px;
    padding:14px;
    text-align:center;
    animation:floatLogo 4s infinite ease-in-out;
}

/* delay animação */
.logo-box:nth-child(2){animation-delay:.4s;}
.logo-box:nth-child(3){animation-delay:.8s;}
.logo-box:nth-child(4){animation-delay:1.2s;}

/* imagem patrocinador */
.logo-box img{
    width:100%;
    height:110px;
    object-fit:contain;
}

/* =========================================================
GALERIA
========================================================= */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
    margin-top:18px;
}

.gallery img,
.gallery iframe,
.gallery video{
    width:100%;
    border-radius:18px;
    box-shadow:0 10px 20px rgba(0,0,0,.10);
}

/* =========================================================
RODAPÉ
========================================================= */
footer{
    text-align:center;
    padding:30px;
    font-weight:bold;
    color:#333;
}

/* =========================================================
ANIMAÇÕES CSS
========================================================= */

/* leve rotação da logo */
@keyframes rotateSoft{
    0%{transform:rotate(0deg);}
    50%{transform:rotate(6deg);}
    100%{transform:rotate(0deg);}
}

/* pulsação do brilho */
@keyframes pulseGlow{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.12);}
}

/* flutuação dos logos */
@keyframes floatLogo{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- =========================================================
TOPO DO SITE
========================================================= -->
<header class="hero">
<div class="wrap">
<div class="hero-grid">

<div class="hero-text">

<h1>6ª FPSS<br>Festa do Padroeiro São Sebastião</h1>

<p>24 de Janeiro de 2027 • Rolim de Moura/RO</p>
<p>Fé, tradição e grande confraternização</p>

<!-- contador -->
<div class="countdown" id="countdown">

<div class="time-box"><div class="time-number" id="dias">0</div><div class="time-label">DIAS</div></div>
<div class="time-box"><div class="time-number" id="horas">0</div><div class="time-label">HORAS</div></div>
<div class="time-box"><div class="time-number" id="minutos">0</div><div class="time-label">MIN</div></div>
<div class="time-box"><div class="time-number" id="segundos">0</div><div class="time-label">SEG</div></div>

</div>

<a class="hero-btn" href="https://wa.me/5569993982037" target="_blank">
Comprar Cartela
</a>

</div>

<div class="hero-side">
<img src="https://raw.githubusercontent.com/saosebastiaorm/festa-sao-sebastiao/main/Imagens/Site/Logo/FPSS/Logo_FPSS_-_IA-removebg.png">
</div>

</div>
</div>
</header>

<!-- =========================================================
JAVASCRIPT (CONTADOR EM TEMPO REAL)
========================================================= -->
<script>

/* define data do evento */
const dataEvento = new Date("2027-01-24T10:00:00").getTime();

/* função principal do contador */
function atualizarContador(){

const agora = new Date().getTime();
const distancia = dataEvento - agora;

/* evento iniciado */
if(distancia <= 0){
document.getElementById("countdown").innerHTML =
"<div class='time-box'><div class='time-number'>HOJE</div><div class='time-label'>A FESTA COMEÇOU</div></div>";
return;
}

/* cálculo de tempo */
document.getElementById("dias").textContent =
Math.floor(distancia/(1000*60*60*24));

document.getElementById("horas").textContent =
Math.floor((distancia%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutos").textContent =
Math.floor((distancia%(1000*60*60))/(1000*60));

document.getElementById("segundos").textContent =
Math.floor((distancia%(1000*60))/1000);

}

/* execução contínua */
setInterval(atualizarContador,1000);
atualizarContador();

</script>

</body>
</html>
