<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enquete FPSS 2027</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/enquete.css">

</head>

<body>

<section class="enquete-fpss">

<div class="enquete-box">

<div class="enquete-topo">

  <div class="badge-enquete">
    🎯 PARTICIPAÇÃO OFICIAL FPSS 2027
  </div>

  <h1>🔥 Enquete Oficial da Festa do Padroeiro São Sebastião</h1>

  <p>
    Sua opinião ajuda a melhorar a festa e ainda te coloca na disputa de uma camiseta exclusiva.
  </p>

  <div class="alerta-topo">
    ⚠️ Responda em menos de 2 minutos e concorra automaticamente
  </div>

</div>

<form id="formEnquete">

<input type="hidden" name="origem" value="ENQUETE">

<!-- DADOS -->
<h2>📌 Dados pessoais</h2>

<label>Nome</label>
<input type="text" name="nome" required>

<label>Sobrenome</label>
<input type="text" name="sobrenome" required>

<label>WhatsApp</label>
<input type="tel" name="whatsapp" id="whatsapp" required>

<label>Data de nascimento</label>
<input type="date" name="nascimento" required>

<label>CEP</label>
<input type="text" name="cep" id="cep" required>

<label>Cidade</label>
<input type="text" name="cidade" id="cidade" required>

<label>Bairro</label>
<input type="text" name="bairro" id="bairro" required>

<label>Rua / Endereço</label>
<input type="text" name="rua" id="rua" required>

<!-- PERGUNTAS -->
<h2>📊 Pesquisa da Festa</h2>

<label>Você já participou da festa?</label>
<select name="participou" required>
  <option value="">Selecione</option>
  <option>Sim, várias vezes</option>
  <option>Sim, uma vez</option>
  <option>Não</option>
</select>

<label>Já comprou cartela?</label>
<select name="cartela" required>
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Como foi sua experiência?</label>
<textarea name="experiencia" placeholder="Comida, organização, ambiente..."></textarea>

<label>O que devemos melhorar?</label>
<textarea name="melhorar" placeholder="Sugestões..."></textarea>

<button type="submit">
🚀 ENVIAR E CONCORRER
</button>

<div id="msg"></div>

</form>

</div>

</section>

<script src="js/enquete.js"></script>

</body>
</html>
