<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enquete FPSS</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/enquete.css">

</head>

<body>

<section class="card center">

<div class="wrap">

<h2 class="section-title">🔥 Enquete Oficial FPSS</h2>

<p>
Participe e concorra a uma camiseta exclusiva da Festa do Padroeiro São Sebastião.
</p>

<form id="formEnquete">

<input type="hidden" name="origem" value="ENQUETE">

<!-- =========================
DADOS PESSOAIS
========================= -->

<h3>📌 Dados pessoais</h3>

<label>Nome</label>
<input type="text" name="nome" required>

<label>Sobrenome</label>
<input type="text" name="sobrenome" required>

<label>WhatsApp</label>
<input type="tel" name="whatsapp" required>

<label>Data de nascimento</label>
<input type="date" name="nascimento" required>

<label>CEP</label>
<input type="text" name="cep" required>

<label>Cidade</label>
<input type="text" name="cidade" required>

<label>Bairro</label>
<input type="text" name="bairro" required>

<label>Rua / Endereço</label>
<input type="text" name="rua" required>

<!-- =========================
PERGUNTAS
========================= -->

<h3>📊 Experiência na Festa</h3>

<label>Você já participou da festa anteriormente?</label>
<select name="participou" required>
  <option value="">Selecione</option>
  <option>Sim, várias vezes</option>
  <option>Sim, uma vez</option>
  <option>Não</option>
</select>

<label>Você já comprou cartela em outras edições?</label>
<select name="cartela" required>
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Como foi sua experiência nas festas anteriores?</label>
<textarea name="experiencia" placeholder="Comida, organização, ambiente..."></textarea>

<label>O que devemos melhorar na próxima festa?</label>
<textarea name="melhorar" placeholder="Sugestões de melhoria..."></textarea>

<button type="submit" class="btn red full">
🚀 ENVIAR E CONCORRER
</button>

<div id="msg"></div>

</form>

</div>

</section>

<script src="js/enquete.js"></script>

</body>
</html>
