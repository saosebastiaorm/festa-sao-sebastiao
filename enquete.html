<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enquete Oficial FPSS</title>

<link rel="stylesheet" href="css/enquete.css">

</head>

<body>

<section class="enquete">

  <div class="topo">
    <h1>🔥 ENQUETE OFICIAL FPSS</h1>
    <p>Ajude a melhorar a Festa do Padroeiro São Sebastião e concorra a uma camiseta oficial</p>

    <div class="alerta">
      🎁 Participação gratuita + sorteio da camiseta
    </div>
  </div>

  <form id="formEnquete">

<input type="hidden" name="origem" value="ENQUETE">

<!-- =========================
DADOS PESSOAIS
========================= -->
<h3>📌 Dados pessoais</h3>

<label>Nome</label>
<input type="text" name="nome" placeholder="Seu nome" required>

<label>Sobrenome</label>
<input type="text" name="sobrenome" placeholder="Seu sobrenome" required>

<label>WhatsApp</label>
<input type="tel" name="whatsapp" placeholder="DDD + número" required>

<label>Idade</label>
<input type="number" name="idade" placeholder="Sua idade" required>

<label>CEP</label>
<input type="text" name="cep" placeholder="Seu CEP" required>

<label>Cidade</label>
<input type="text" name="cidade" placeholder="Sua cidade" required>

<label>Bairro</label>
<input type="text" name="bairro" placeholder="Seu bairro" required>

<label>Rua / Endereço</label>
<input type="text" name="rua" placeholder="Seu endereço completo" required>

<!-- =========================
PESQUISA DA FESTA
========================= -->
<h3>📊 Experiência na Festa</h3>

<label>Você já participou da festa anteriormente?</label>
<select name="participou" required>
  <option value="">Selecione</option>
  <option>Sim, participei várias vezes</option>
  <option>Sim, uma vez</option>
  <option>Não, nunca participei</option>
</select>

<label>Você já comprou cartela em outras edições?</label>
<select name="cartela" required>
  <option value="">Selecione</option>
  <option>Sim</option>
  <option>Não</option>
</select>

<label>Como foi sua experiência nas festas anteriores?</label>
<textarea name="experiencia" placeholder="Ex: gostei da organização, comida, ambiente, música..." ></textarea>

<label>O que devemos melhorar na próxima festa?</label>
<textarea name="melhorar" placeholder="Ex: mais mesas, mais organização, mais opções de comida..." ></textarea>

<button type="submit">
🚀 ENVIAR E CONCORRER
</button>

<div id="msg"></div>

</form>

</section>

<script src="js/enquete.js"></script>

</body>
</html>
