<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo VIP FPSS</title>

<link rel="stylesheet" href="css/vip.css">

</head>

<body>

<section class="vip-fpss">

  <div class="vip-box">

    <h2>🔥 GRUPO VIP FPSS</h2>

    <p>Receba novidades da festa em primeira mão</p>

    <form id="formVIP">

      <!-- IMPORTANTE: ORIGEM -->
      <input type="hidden" name="origem" value="VIP">

      <input type="text" name="nome" placeholder="Nome completo" required>

      <input type="tel" name="whatsapp" id="whatsapp" placeholder="WhatsApp" required>

      <input type="text" name="cidade" placeholder="Cidade" required>

      <input type="text" name="bairro" placeholder="Bairro" required>

      <button type="submit">
        ENTRAR NO VIP 🚀
      </button>

    </form>

    <div id="msgVIP"></div>

  </div>

</section>

<script src="js/vip.js"></script>

</body>
</html>
