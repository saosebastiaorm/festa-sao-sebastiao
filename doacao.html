<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doação FPSS</title>

<link rel="stylesheet" href="../css/doacao.css">

</head>
<body>

<section class="doacao-fpss">

  <div class="box">

    <h1>🙏 Apoie a Festa do Padroeiro</h1>

    <p>
      Sua ajuda faz toda diferença. Você pode contribuir com dinheiro,
      gado, brindes ou serviços.
    </p>

    <form id="formDoacao">

      <input type="text" name="nome" placeholder="Nome completo" required>

      <input type="tel" name="whatsapp" id="whatsapp" placeholder="WhatsApp" required>

      <select name="tipo" required>
        <option value="">Tipo de doação</option>
        <option value="DINHEIRO">💰 Dinheiro</option>
        <option value="GADO">🐄 Gado</option>
        <option value="BRINDE">🎁 Brinde</option>
        <option value="SERVICO">🛠 Serviço</option>
      </select>

      <input type="number" name="valor" placeholder="Valor (R$) - opcional">

      <button type="submit">💚 DOAR AGORA</button>

    </form>

    <div id="pixArea" class="hidden">

      <h3>📲 Faça o pagamento via PIX</h3>

      <textarea id="pixCode" readonly></textarea>

      <button onclick="copiarPix()">📋 Copiar PIX</button>

      <img id="qrPix" />

    </div>

    <div id="msg"></div>

  </div>

</section>

<script src="../js/doacao.js"></script>

</body>
</html>
