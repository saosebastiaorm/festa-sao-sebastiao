<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doação • FPSS 2027</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/mobile.css">
<link rel="stylesheet" href="../css/doacao.css">

</head>

<body>

<section class="doacao-page">

<div class="doacao-box">

<h1>🙏 Apoie a Festa do Padroeiro</h1>

<p class="sub">
Sua ajuda é fundamental para manter essa tradição viva.
Você pode doar dinheiro, produtos, serviços ou estrutura.
</p>

<form id="formDoacao">

<!-- NOME -->
<label>Nome</label>
<input type="text" name="nome" required placeholder="Seu nome">

<!-- WHATSAPP -->
<label>WhatsApp</label>
<input type="tel" name="whatsapp" required placeholder="(69) 99999-9999">

<!-- CIDADE -->
<label>Cidade</label>
<input type="text" name="cidade" placeholder="Sua cidade">

<!-- TIPO -->
<label>Tipo de doação</label>
<select name="tipo_doacao" id="tipoDoacao" required>

<option value="">Selecione</option>

<optgroup label="💰 Financeiro">
<option value="Dinheiro">Dinheiro (PIX)</option>
<option value="Patrocínio">Patrocínio</option>
</optgroup>

<optgroup label="🐄 Agro">
<option value="Gado">Gado</option>
<option value="Carne">Carne</option>
<option value="Leite">Leite</option>
<option value="Produtos Rurais">Produtos Rurais</option>
</optgroup>

<optgroup label="🍽 Alimentação">
<option value="Alimentos">Alimentos</option>
<option value="Bebidas">Bebidas</option>
<option value="Ingredientes">Ingredientes</option>
</optgroup>

<optgroup label="🎁 Evento">
<option value="Brindes">Brindes</option>
<option value="Prêmios">Prêmios</option>
<option value="Camisetas">Camisetas</option>
</optgroup>

<optgroup label="🛠 Serviços">
<option value="Mão de obra">Mão de obra</option>
<option value="Som">Som</option>
<option value="Show">Show</option>
<option value="Transporte">Transporte</option>
<option value="Divulgação">Divulgação</option>
</optgroup>

<optgroup label="🏗 Estrutura">
<option value="Tendas">Tendas</option>
<option value="Mesas e cadeiras">Mesas e cadeiras</option>
<option value="Equipamentos">Equipamentos</option>
<option value="Gerador">Gerador</option>
</optgroup>

<optgroup label="📦 Outros">
<option value="Outros">Outros</option>
</optgroup>

</select>

<!-- VALOR -->
<div id="boxValor">
<label>Valor (R$)</label>
<input type="number" name="valor_doacao" placeholder="Ex: 50">
</div>

<!-- DESCRIÇÃO -->
<label>Descrição</label>
<textarea name="descricao_doacao" placeholder="Descreva sua doação"></textarea>

<button type="submit">QUERO AJUDAR 🙏</button>

</form>

<div id="msgDoacao"></div>

</div>

</section>
<script src="../js/doacao.js"></script>
</body>
</html>
