<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doação FPSS</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

/* FUNDO */
body{
  background:linear-gradient(135deg,#8b1111,#c61f1f);
}

/* CENTRALIZA */
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CAIXA */
.box{
  width:100%;
  max-width:500px;
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
}

/* TITULO */
h1{
  text-align:center;
  color:#8b1111;
  margin-bottom:10px;
}

p{
  text-align:center;
  margin-bottom:20px;
  color:#555;
}

/* CAMPOS */
input, select, textarea{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
}

/* BOTAO */
button{
  width:100%;
  padding:16px;
  background:#1fae42;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  transform:scale(1.03);
}

/* MSG */
#msg{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="box">

<h1>🙏 Apoie a Festa</h1>

<p>Ajude com qualquer tipo de doação</p>

<form id="formDoacao">

<input type="text" name="nome" placeholder="Seu nome" required>
<input type="tel" name="whatsapp" placeholder="WhatsApp" required>

<select name="tipo_doacao" required>
<option value="">Tipo de doação</option>
<option>Dinheiro</option>
<option>Gado</option>
<option>Brindes</option>
<option>Serviço</option>
<option>Alimentos</option>
<option>Outros</option>
</select>

<textarea name="descricao_doacao" placeholder="Descreva sua doação"></textarea>

<button type="submit">QUERO AJUDAR 🙏</button>

</form>

<div id="msg"></div>

</div>

</div>

</body>
</html>
